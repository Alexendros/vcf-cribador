name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release x86_64-unknown-linux-gnu
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          strip vcf-cribador || true
          tar czf vcf-cribador-x86_64-unknown-linux-gnu.tar.gz vcf-cribador
          sha256sum vcf-cribador-x86_64-unknown-linux-gnu.tar.gz > vcf-cribador-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/x86_64-unknown-linux-gnu/release/vcf-cribador-x86_64-unknown-linux-gnu.tar.gz
            target/x86_64-unknown-linux-gnu/release/vcf-cribador-x86_64-unknown-linux-gnu.tar.gz.sha256

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}
