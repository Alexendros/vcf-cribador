name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1' # cada lunes 08:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions-rust-lang/audit@v1
