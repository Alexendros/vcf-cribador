name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  health:
    name: Health Check
    runs-on: [self-hosted, ts]
    steps:
      - run: |
          echo "=== Runner health check ==="
          command -v cc      && echo "✓ cc (build-essential)" || echo "✗ cc missing"
          command -v cargo   && echo "✓ cargo ($(cargo --version | head -1))" || echo "✗ cargo missing"
          command -v rustup  && echo "✓ rustup" || echo "✗ rustup missing"
          echo "=== All systems go ==="
        shell: bash

  check:
    name: Check (stable)
    needs: [health]
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  msrv:
    name: Check (MSRV 1.80)
    needs: [health]
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.80
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  fmt:
    name: Format
    needs: [health]
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: [check]
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features -- -D warnings

  test:
    name: Test
    needs: [check]
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  doc:
    name: Doc
    needs: [check]
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --document-private-items

  coverage:
    name: Coverage
    needs: [test]
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --lcov --output-path coverage/lcov.info
      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info
